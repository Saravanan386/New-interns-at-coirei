<!DOCTYPE html>
<html>
<head>
    <title>Jitsi LMS Test</title>

    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #jitsi-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="jitsi-container"></div>

    <script>

        // Simulate backend response

        const sessionData = {
            session_id: 25,
            room_name: "classroom_5_Xa9kslQmP2cR7YvT",
            display_name: "Pradeep",
            role: "student",
            domain: "meet.jit.si"
        };

        const api = new JitsiMeetExternalAPI(
            sessionData.domain,
            {
                roomName: sessionData.room_name,

                parentNode:
                    document.querySelector(
                        "#jitsi-container"
                    ),

                userInfo: {
                    displayName:
                        sessionData.display_name
                },

                configOverwrite: {

                    prejoinPageEnabled: false,

                    startWithAudioMuted: false,

                    startWithVideoMuted: false
                },

                interfaceConfigOverwrite: {

                    SHOW_JITSI_WATERMARK: false,

                    SHOW_BRAND_WATERMARK: false
                }
            }
        );

    </script>

</body>
</html>
